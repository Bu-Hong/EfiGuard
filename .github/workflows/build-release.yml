name: Build EfiGuard

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: 使用 EDK2 构建 EfiGuardDxe.efi 和 Loader.efi
  # ============================================================
  build-efi:
    name: Build EFI Modules (EDK2 + VS2019)
    runs-on: windows-2019
    
    steps:
      - name: Checkout EfiGuard
        uses: actions/checkout@v4
        with:
          path: edk2/EfiGuardPkg
          submodules: recursive

      - name: Checkout EDK2
        uses: actions/checkout@v4
        with:
          repository: tianocore/edk2
          ref: edk2-stable202308
          path: edk2
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Build EDK2 BaseTools
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat Rebuild
          if errorlevel 1 exit /b 1

      - name: Build EfiGuard (RELEASE)
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat
          build -a X64 -t VS2019 -p EfiGuardPkg/EfiGuardPkg.dsc -b RELEASE
          if errorlevel 1 exit /b 1

      - name: Build EfiGuard (DEBUG)
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat
          build -a X64 -t VS2019 -p EfiGuardPkg/EfiGuardPkg.dsc -b DEBUG
          if errorlevel 1 exit /b 1

      - name: List build outputs
        shell: cmd
        working-directory: edk2
        run: |
          dir /s /b Build\EfiGuard\RELEASE_VS2019\X64\*.efi
          dir /s /b Build\EfiGuard\DEBUG_VS2019\X64\*.efi

      - name: Upload EFI artifacts (RELEASE)
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-EFI-RELEASE
          path: |
            edk2/Build/EfiGuard/RELEASE_VS2019/X64/EfiGuardDxe.efi
            edk2/Build/EfiGuard/RELEASE_VS2019/X64/Loader.efi

      - name: Upload EFI artifacts (DEBUG)
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-EFI-DEBUG
          path: |
            edk2/Build/EfiGuard/DEBUG_VS2019/X64/EfiGuardDxe.efi
            edk2/Build/EfiGuard/DEBUG_VS2019/X64/Loader.efi

  # ============================================================
  # Job 2: 使用 MSBuild 构建 EfiDSEFix.exe
  # ============================================================
  build-dsefix:
    name: Build EfiDSEFix (MSBuild)
    runs-on: windows-2022
    
    strategy:
      matrix:
        configuration: [Release, Debug]
        platform: [x64]
    
    steps:
      - name: Checkout EfiGuard
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages (if any)
        run: |
          if (Test-Path "EfiGuard.sln") {
            nuget restore EfiGuard.sln -ErrorAction SilentlyContinue
          }
        continue-on-error: true

      - name: Build EfiDSEFix
        run: |
          msbuild EfiGuard.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsTargetPlatformVersion=10.0 `
            /m `
            /t:EfiDSEFix
        shell: pwsh

      - name: List build outputs
        run: |
          Get-ChildItem -Path "Application/EfiDSEFix/bin" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Upload EfiDSEFix artifact
        uses: actions/upload-artifact@v4
        with:
          name: EfiDSEFix-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            Application/EfiDSEFix/bin/**/EfiDSEFix.exe
            Application/EfiDSEFix/bin/**/EfiDSEFix.pdb

  # ============================================================
  # Job 3: 打包发布 (仅在 tag 推送时触发)
  # ============================================================
  release:
    name: Create Release
    needs: [build-efi, build-dsefix]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create release package
        run: |
          mkdir -p release/EfiGuard
          
          # 复制 RELEASE 版本的 EFI 文件
          cp artifacts/EfiGuard-EFI-RELEASE/EfiGuardDxe.efi release/EfiGuard/
          cp artifacts/EfiGuard-EFI-RELEASE/Loader.efi release/EfiGuard/
          
          # 复制 EfiDSEFix.exe (Release x64)
          find artifacts/EfiDSEFix-Release-x64 -name "EfiDSEFix.exe" -exec cp {} release/EfiGuard/ \;
          
          # 创建压缩包
          cd release
          zip -r EfiGuard-${{ github.ref_name }}.zip EfiGuard/
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/EfiGuard-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
