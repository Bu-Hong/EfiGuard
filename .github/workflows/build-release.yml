name: Build and Release EfiGuard Suite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      WORKSPACE_ROOT: ${{ github.workspace }}
      EDK2_DIR: ${{ github.workspace }}\edk2
      EFIGUARD_PKG_DIR: ${{ github.workspace }}\EfiGuardPkg
    steps:
      - name: Checkout EfiGuard repository
        uses: actions/checkout@v4
        with:
          path: EfiGuardPkg

      # 1. 配置 Git 身份
      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
        shell: pwsh

      # 2. 用浅克隆拉取 EDK2 主仓库（不包含子模块）
      - name: Shallow clone EDK2
        run: |
          git clone --depth 1 --branch edk2-stable202411 https://github.com/tianocore/edk2.git ${{ env.EDK2_DIR }}
          cd ${{ env.EDK2_DIR }}
          # 仅拉取构建必须的子模块，跳过其他大型子模块
          git submodule update --init --recursive --depth 1 --recommend-shallow BaseTools
        shell: pwsh

      # 3. 安装编译依赖
      - name: Install build dependencies
        run: |
          choco install nasm -y
          choco install python3 -y
          python -m pip install --upgrade pip
          pip install setuptools wheel
        shell: pwsh

      # 4. 构建 EDK2 BaseTools
      - name: Build EDK2 BaseTools
        run: |
          cd ${{ env.EDK2_DIR }}
          call edksetup.bat --nt32
          nmake -C BaseTools
        shell: cmd

      # 5. 编译 EFI 文件
      - name: Build EfiGuard EFI files
        run: |
          cd ${{ env.EDK2_DIR }}
          call edksetup.bat --nt32
          build -a X64 -t VS2022 -p ${{ env.EFIGUARD_PKG_DIR }}\EfiGuardPkg.dsc -b RELEASE
        shell: cmd

      # 6. 编译 EfiDSEFix.exe
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: |
          nuget restore "${{ env.EFIGUARD_PKG_DIR }}\EfiGuard.sln"
        shell: pwsh

      - name: Build EfiDSEFix.exe
        run: |
          msbuild "${{ env.EFIGUARD_PKG_DIR }}\EfiGuard.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal
        shell: pwsh

      # 7. 收集所有产物
      - name: Prepare artifacts
        run: |
          mkdir -p release
          # 复制 EfiDSEFix.exe
          $exePath = "${{ env.EFIGUARD_PKG_DIR }}\Application\EfiDSEFix\bin\Release\EfiDSEFix.exe"
          if (Test-Path $exePath) {
            copy $exePath release\
          } else {
            Write-Error "❌ 找不到 EfiDSEFix.exe: $exePath"
            exit 1
          }
          # 复制 EDK2 产物
          $efiDir = "${{ env.EDK2_DIR }}\Build\EfiGuard\RELEASE_VS2022\X64"
          if (Test-Path "$efiDir\EfiGuardDxe.efi") {
            copy "$efiDir\EfiGuardDxe.efi" release\
          } else {
            Write-Error "❌ 找不到 EfiGuardDxe.efi: $efiDir"
            exit 1
          }
          if (Test-Path "$efiDir\Loader.efi") {
            copy "$efiDir\Loader.efi" release\
          } else {
            Write-Error "❌ 找不到 Loader.efi: $efiDir"
            exit 1
          }
          dir release\
        shell: pwsh

      # 8. 打包
      - name: Create ZIP package
        run: |
          Compress-Archive -Path release\* -DestinationPath "EfiGuard-Suite-${{ github.ref_name }}.zip"
        shell: pwsh

      # 9. 发布
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "EfiGuard-Suite-${{ github.ref_name }}.zip"
          name: "Release ${{ github.ref_name }}"
          body: |
            ### EfiGuard Suite ${{ github.ref_name }}
            - 编译环境: Windows-latest (VS2022 + EDK2 stable202411)
            - 包含文件:
              - `EfiDSEFix.exe`
              - `EfiGuardDxe.efi`
              - `Loader.efi`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
