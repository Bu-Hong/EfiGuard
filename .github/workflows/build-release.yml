name: Build EfiGuard

# 仅支持手动触发
on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: '构建配置'
        required: true
        default: 'RELEASE'
        type: choice
        options:
          - RELEASE
          - DEBUG
          - BOTH
      edk2_version:
        description: 'EDK2 版本'
        required: true
        default: 'edk2-stable202308'
        type: choice
        options:
          - edk2-stable202308
          - edk2-stable202311
          - edk2-stable202405
          - edk2-stable202408
      create_release:
        description: '是否创建 Release 发布'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release 标签 (例如: v1.0.0)，仅当勾选创建 Release 时生效'
        required: false
        default: 'v1.0.0'
        type: string

jobs:
  # ============================================================
  # Job 1: 使用 EDK2 构建 EfiGuardDxe.efi 和 Loader.efi
  # ============================================================
  build-efi:
    name: Build EFI Modules (EDK2 + VS2026)
    runs-on: windows-2025-vs2026
    
    steps:
      - name: Checkout EDK2 (${{ inputs.edk2_version }}) - shallow, no submodules
        shell: pwsh
        run: |
          Write-Host "Cloning EDK2 ${{ inputs.edk2_version }} (no submodules)..."
          git clone --depth 1 --branch ${{ inputs.edk2_version }} --no-recurse-submodules https://github.com/tianocore/edk2.git edk2
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ git clone failed"
            exit 1
          }
          
          Write-Host "✅ EDK2 cloned successfully"
          
          # 验证关键文件
          if (-not (Test-Path "edk2/edksetup.bat")) {
            Write-Host "❌ edksetup.bat NOT found"
            exit 1
          }
          if (-not (Test-Path "edk2/MdePkg/Include/Uefi/UefiMultiPhase.h")) {
            Write-Host "❌ MdePkg headers NOT found"
            exit 1
          }
          Write-Host "✅ EDK2 ready"

      - name: Checkout EfiGuard into edk2/EfiGuardPkg
        uses: actions/checkout@v4
        with:
          path: edk2/EfiGuardPkg
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Build EDK2 BaseTools
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat Rebuild
          if errorlevel 1 exit /b 1

      - name: Build EfiGuard (RELEASE)
        if: ${{ inputs.build_configuration == 'RELEASE' || inputs.build_configuration == 'BOTH' }}
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat
          build -a X64 -t VS2019 -p EfiGuardPkg/EfiGuardPkg.dsc -b RELEASE
          if errorlevel 1 exit /b 1

      - name: Build EfiGuard (DEBUG)
        if: ${{ inputs.build_configuration == 'DEBUG' || inputs.build_configuration == 'BOTH' }}
        shell: cmd
        working-directory: edk2
        run: |
          call edksetup.bat
          build -a X64 -t VS2019 -p EfiGuardPkg/EfiGuardPkg.dsc -b DEBUG
          if errorlevel 1 exit /b 1

      - name: List build outputs
        shell: cmd
        working-directory: edk2
        run: |
          if exist Build\EfiGuard\RELEASE_VS2019\X64 dir /s /b Build\EfiGuard\RELEASE_VS2019\X64\*.efi
          if exist Build\EfiGuard\DEBUG_VS2019\X64 dir /s /b Build\EfiGuard\DEBUG_VS2019\X64\*.efi

      - name: Upload EFI artifacts (RELEASE)
        if: ${{ inputs.build_configuration == 'RELEASE' || inputs.build_configuration == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-EFI-RELEASE
          path: |
            edk2/Build/EfiGuard/RELEASE_VS2019/X64/EfiGuardDxe.efi
            edk2/Build/EfiGuard/RELEASE_VS2019/X64/Loader.efi

      - name: Upload EFI artifacts (DEBUG)
        if: ${{ inputs.build_configuration == 'DEBUG' || inputs.build_configuration == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-EFI-DEBUG
          path: |
            edk2/Build/EfiGuard/DEBUG_VS2019/X64/EfiGuardDxe.efi
            edk2/Build/EfiGuard/DEBUG_VS2019/X64/Loader.efi

    # ============================================================
  # Job 2: 使用 MSBuild 构建 EfiDSEFix.exe
  # ============================================================
  build-dsefix:
    name: Build EfiDSEFix (MSBuild)
    runs-on: windows-2022
    
    steps:
      # 注意：EfiDSEFix.vcxproj 中头文件路径是 ..\MdePkg\Include
      # 所以需要把 EfiGuard 和 EDK2 放在同一父目录下
      - name: Checkout EfiGuard
        uses: actions/checkout@v4
        with:
          path: workspace/EfiGuard
          submodules: recursive

      - name: Checkout EDK2 (${{ inputs.edk2_version }})
        uses: actions/checkout@v4
        with:
          repository: tianocore/edk2
          ref: ${{ inputs.edk2_version }}
          path: workspace/edk2-temp
          submodules: false  # 不需要 EDK2 的子模块，只要头文件

      - name: Setup EDK2 headers in expected location
        shell: pwsh
        working-directory: workspace
        run: |
          # 把 EDK2 的关键 Package 目录移动到与 EfiGuard 同级
          # 因为 EfiDSEFix.vcxproj 引用的是 ..\MdePkg\Include 等
          $packages = @('MdePkg', 'MdeModulePkg', 'UefiCpuPkg', 'IntelFrameworkPkg', 'IntelFrameworkModulePkg')
          foreach ($pkg in $packages) {
            $src = "edk2-temp/$pkg"
            $dst = "./$pkg"
            if (Test-Path $src) {
              Move-Item $src $dst -ErrorAction SilentlyContinue
              Write-Host "Moved $pkg"
            }
          }
          
          # 显示目录结构验证
          Write-Host "`nWorkspace structure:"
          Get-ChildItem . -Directory | ForEach-Object { Write-Host "  - $($_.Name)" }
          
          # 验证关键头文件
          $checkFile = "MdePkg/Include/Uefi/UefiMultiPhase.h"
          if (Test-Path $checkFile) {
            Write-Host "`n✅ Found: $checkFile"
          } else {
            Write-Host "`n❌ NOT FOUND: $checkFile"
            exit 1
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect Windows SDK Version
        id: sdk
        shell: pwsh
        run: |
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include"
          if (Test-Path $sdkPath) {
            $sdkVersions = Get-ChildItem $sdkPath -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending
            Write-Host "Available Windows SDK versions:"
            $sdkVersions | ForEach-Object { Write-Host "  - $($_.Name)" }
            $latestSdk = $sdkVersions | Select-Object -First 1
            echo "SDK_VERSION=$($latestSdk.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "Selected SDK: $($latestSdk.Name)"
          }

      - name: Build EfiDSEFix (RELEASE)
        if: ${{ inputs.build_configuration == 'RELEASE' || inputs.build_configuration == 'BOTH' }}
        shell: pwsh
        working-directory: workspace/EfiGuard
        run: |
          msbuild EfiGuard.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.SDK_VERSION }} `
            /m `
            /t:EfiDSEFix

      - name: Build EfiDSEFix (DEBUG)
        if: ${{ inputs.build_configuration == 'DEBUG' || inputs.build_configuration == 'BOTH' }}
        shell: pwsh
        working-directory: workspace/EfiGuard
        run: |
          msbuild EfiGuard.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.SDK_VERSION }} `
            /m `
            /t:EfiDSEFix

      - name: List build outputs
        shell: pwsh
        working-directory: workspace/EfiGuard
        run: |
          if (Test-Path "Application/EfiDSEFix/bin") {
            Get-ChildItem -Path "Application/EfiDSEFix/bin" -Recurse -Filter "*.exe"
          } else {
            Write-Host "Searching for EfiDSEFix.exe..."
            Get-ChildItem -Path "." -Recurse -Filter "EfiDSEFix.exe" -ErrorAction SilentlyContinue
          }

      - name: Upload EfiDSEFix artifact (RELEASE)
        if: ${{ inputs.build_configuration == 'RELEASE' || inputs.build_configuration == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: EfiDSEFix-Release-x64
          path: |
            workspace/EfiGuard/Application/EfiDSEFix/bin/x64/Release/EfiDSEFix.exe
            workspace/EfiGuard/Application/EfiDSEFix/bin/x64/Release/EfiDSEFix.pdb
          if-no-files-found: warn

      - name: Upload EfiDSEFix artifact (DEBUG)
        if: ${{ inputs.build_configuration == 'DEBUG' || inputs.build_configuration == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: EfiDSEFix-Debug-x64
          path: |
            workspace/EfiGuard/Application/EfiDSEFix/bin/x64/Debug/EfiDSEFix.exe
            workspace/EfiGuard/Application/EfiDSEFix/bin/x64/Debug/EfiDSEFix.pdb
          if-no-files-found: warn

  # ============================================================
  # Job 3: 打包发布 (仅当用户手动勾选时触发)
  # ============================================================
  release:
    name: Create Release
    needs: [build-efi, build-dsefix]
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release == true }}
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create release package
        run: |
          mkdir -p release/EfiGuard
          
          # 复制 RELEASE 版本的 EFI 文件（如果存在）
          if [ -d "artifacts/EfiGuard-EFI-RELEASE" ]; then
            cp artifacts/EfiGuard-EFI-RELEASE/EfiGuardDxe.efi release/EfiGuard/ 2>/dev/null || true
            cp artifacts/EfiGuard-EFI-RELEASE/Loader.efi release/EfiGuard/ 2>/dev/null || true
          fi
          
          # 复制 EfiDSEFix.exe (Release x64)
          if [ -d "artifacts/EfiDSEFix-Release-x64" ]; then
            find artifacts/EfiDSEFix-Release-x64 -name "EfiDSEFix.exe" -exec cp {} release/EfiGuard/ \;
          fi
          
          # 创建压缩包
          cd release
          zip -r EfiGuard-${{ inputs.release_tag }}.zip EfiGuard/
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/EfiGuard-*.zip
          tag_name: ${{ inputs.release_tag }}
          name: EfiGuard ${{ inputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
